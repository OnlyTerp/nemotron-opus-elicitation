<svg width="1280" height="560" viewBox="0 0 1280 560" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgba" x1="0" y1="0" x2="0" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141414"/><stop offset="1" stop-color="#101018"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="560" rx="20" fill="url(#bgba)"/>
  <rect x="0.5" y="0.5" width="1279" height="559" rx="19.5" fill="none" stroke="#2E2E2E"/>

  <text x="48" y="58" fill="#F3F4F6" font-size="30" font-weight="800">What v16 actually changes</text>
  <text x="48" y="88" fill="#9CA3AF" font-size="16">Four default Nemotron behaviors — and the disposition the prompt installs to fix each. Evidence is blind, dual non-Nemotron judges.</text>

  <!-- column headers -->
  <g transform="translate(0 120)">
    <text x="48" y="0" fill="#6F8DA6" font-size="13" letter-spacing="2" font-weight="700">DEFAULT BEHAVIOR</text>
    <rect x="470" y="-22" width="118" height="30" rx="15" fill="#2a1414" stroke="#F53B3A" stroke-opacity="0.5"/>
    <text x="529" y="-2" fill="#F53B3A" font-size="14" font-weight="700" text-anchor="middle">cold</text>
    <rect x="700" y="-22" width="118" height="30" rx="15" fill="#10241c" stroke="#35C89A" stroke-opacity="0.6"/>
    <text x="759" y="-2" fill="#35C89A" font-size="14" font-weight="700" text-anchor="middle">v16</text>
    <text x="980" y="0" fill="#6F8DA6" font-size="13" letter-spacing="2" font-weight="700">EVIDENCE</text>
  </g>

  <!-- rows -->
  <g font-size="17">
    <!-- row template -->
    <g transform="translate(0 168)">
      <rect x="32" y="-30" width="1216" height="76" rx="12" fill="#1b1b24" stroke="#2E2E2E"/>
      <text x="48" y="-4" fill="#F3F4F6" font-weight="700">Flat "No." on "check me"</text>
      <text x="48" y="22" fill="#9CA3AF" font-size="13">never says what you got right</text>
      <text x="470" y="8" fill="#F29A45" font-weight="700">VOICE 1/4</text>
      <text x="700" y="8" fill="#35C89A" font-weight="700">VOICE 4/4</text>
      <text x="980" y="8" fill="#C7D2FE" font-size="14">EXP14 mixed battery</text>
    </g>
    <g transform="translate(0 256)">
      <rect x="32" y="-30" width="1216" height="76" rx="12" fill="#1b1b24" stroke="#2E2E2E"/>
      <text x="48" y="-4" fill="#F3F4F6" font-weight="700">Silent code bugs slip through</text>
      <text x="48" y="22" fill="#9CA3AF" font-size="13">off-by-ones, wrong formulas — eyeballed not checked</text>
      <text x="470" y="8" fill="#F53B3A" font-weight="700">2 / 10</text>
      <text x="700" y="8" fill="#35C89A" font-weight="700">10 / 10</text>
      <text x="980" y="8" fill="#C7D2FE" font-size="14">EXP17 execute-verify</text>
    </g>
    <g transform="translate(0 344)">
      <rect x="32" y="-30" width="1216" height="76" rx="12" fill="#1b1b24" stroke="#2E2E2E"/>
      <text x="48" y="-4" fill="#F3F4F6" font-weight="700">Process narration leaks</text>
      <text x="48" y="22" fill="#9CA3AF" font-size="13">"Premise check: ... Gate 1 ..." + repetition loops</text>
      <text x="470" y="8" fill="#F29A45" font-weight="700">2 / 13 leak</text>
      <text x="700" y="8" fill="#35C89A" font-weight="700">0 / 13</text>
      <text x="980" y="8" fill="#C7D2FE" font-size="14">EXP08–09 de-labeling</text>
    </g>
    <g transform="translate(0 432)">
      <rect x="32" y="-30" width="1216" height="76" rx="12" fill="#1b1b24" stroke="#2E2E2E"/>
      <text x="48" y="-4" fill="#F3F4F6" font-weight="700">Locked in professional register</text>
      <text x="48" y="22" fill="#9CA3AF" font-size="13">flat tone regardless of the user's energy</text>
      <text x="470" y="8" fill="#F29A45" font-weight="700">flat</text>
      <text x="700" y="8" fill="#35C89A" font-weight="700">"Hell yeah" / "Nope"</text>
      <text x="980" y="8" fill="#C7D2FE" font-size="14">EXP22–23 calibration</text>
    </g>
  </g>

  <!-- footnote -->
  <text x="48" y="524" fill="#6F8DA6" font-size="13">No false-positive cost: 0/6 invented bugs in correct code (EXP05, EXP14). Judges: MiMo v2.5 Pro + MiniMax-M3, 80–98% agreement.</text>
</svg>
