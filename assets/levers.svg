<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgl" x1="0" y1="0" x2="0" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141414"/><stop offset="1" stop-color="#101018"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7A84FF"/><stop offset="0.5" stop-color="#A78CFF"/><stop offset="1" stop-color="#35C89A"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="520" rx="20" fill="url(#bgl)"/>
  <rect x="0.5" y="0.5" width="1279" height="519" rx="19.5" fill="none" stroke="#2E2E2E"/>

  <text x="48" y="58" fill="#F3F4F6" font-size="30" font-weight="800">The method: audit, then supply</text>
  <text x="48" y="88" fill="#9CA3AF" font-size="16">Don't bolt on machinery the model already has. Find the missing dispositions and install exactly those — in the leanest persona.</text>

  <!-- method flow -->
  <g transform="translate(48 120)">
    <g>
      <rect width="368" height="78" rx="12" fill="#1b1b24" stroke="#7A84FF" stroke-opacity="0.5"/>
      <text x="20" y="32" fill="#7A84FF" font-size="13" font-weight="700">1 · AUDIT</text>
      <text x="20" y="58" fill="#D1D5DB" font-size="15">Probe the bare model for missing dispositions</text>
    </g>
    <path d="M376 39 H418" stroke="url(#flow)" stroke-width="3"/>
    <path d="M414 33 l10 6 l-10 6 z" fill="#A78CFF"/>
    <g transform="translate(428 0)">
      <rect width="368" height="78" rx="12" fill="#1b1b24" stroke="#A78CFF" stroke-opacity="0.5"/>
      <text x="20" y="32" fill="#A78CFF" font-size="13" font-weight="700">2 · SUPPLY</text>
      <text x="20" y="58" fill="#D1D5DB" font-size="15">Add only what's missing, lean persona</text>
    </g>
    <path d="M804 39 H846" stroke="url(#flow)" stroke-width="3"/>
    <path d="M842 33 l10 6 l-10 6 z" fill="#35C89A"/>
    <g transform="translate(856 0)">
      <rect width="328" height="78" rx="12" fill="#1b1b24" stroke="#35C89A" stroke-opacity="0.5"/>
      <text x="20" y="32" fill="#35C89A" font-size="13" font-weight="700">3 · VERIFY</text>
      <text x="20" y="58" fill="#D1D5DB" font-size="15">vs length-matched placebo + blind judges</text>
    </g>
  </g>

  <text x="48" y="262" fill="#6F8DA6" font-size="13" letter-spacing="2" font-weight="700">THE FOUR DISPOSITIONS v16 INSTALLS</text>

  <!-- four disposition cards -->
  <g transform="translate(48 284)" font-size="15">
    <g>
      <rect width="284" height="172" rx="14" fill="#181820" stroke="#2E2E2E"/>
      <rect x="0" y="0" width="284" height="5" rx="2.5" fill="#7A84FF"/>
      <text x="22" y="46" fill="#7A84FF" font-size="20" font-weight="800">Validate-first</text>
      <text x="22" y="80" fill="#9CA3AF" font-size="14">Acknowledge what's right</text>
      <text x="22" y="102" fill="#9CA3AF" font-size="14">before correcting what's</text>
      <text x="22" y="124" fill="#9CA3AF" font-size="14">wrong.</text>
      <text x="22" y="156" fill="#35C89A" font-size="13" font-weight="700">VOICE 1/4 → 4/4</text>
    </g>
    <g transform="translate(300 0)">
      <rect width="284" height="172" rx="14" fill="#181820" stroke="#2E2E2E"/>
      <rect x="0" y="0" width="284" height="5" rx="2.5" fill="#A78CFF"/>
      <text x="22" y="46" fill="#A78CFF" font-size="20" font-weight="800">Premise-first</text>
      <text x="22" y="80" fill="#9CA3AF" font-size="14">Surface a false assumption</text>
      <text x="22" y="102" fill="#9CA3AF" font-size="14">first, then deliver the</text>
      <text x="22" y="124" fill="#9CA3AF" font-size="14">corrected work.</text>
      <text x="22" y="156" fill="#35C89A" font-size="13" font-weight="700">0 false positives</text>
    </g>
    <g transform="translate(600 0)">
      <rect width="284" height="172" rx="14" fill="#181820" stroke="#2E2E2E"/>
      <rect x="0" y="0" width="284" height="5" rx="2.5" fill="#35C89A"/>
      <text x="22" y="46" fill="#35C89A" font-size="20" font-weight="800">Execute-verify</text>
      <text x="22" y="80" fill="#9CA3AF" font-size="14">Check code output on a</text>
      <text x="22" y="102" fill="#9CA3AF" font-size="14">boundary input before</text>
      <text x="22" y="124" fill="#9CA3AF" font-size="14">judging it correct.</text>
      <text x="22" y="156" fill="#35C89A" font-size="13" font-weight="700">recall 2/10 → 10/10</text>
    </g>
    <g transform="translate(900 0)">
      <rect width="284" height="172" rx="14" fill="#181820" stroke="#2E2E2E"/>
      <rect x="0" y="0" width="284" height="5" rx="2.5" fill="#F29A45"/>
      <text x="22" y="46" fill="#F29A45" font-size="20" font-weight="800">Register match</text>
      <text x="22" y="80" fill="#9CA3AF" font-size="14">Mirror the user's energy —</text>
      <text x="22" y="102" fill="#9CA3AF" font-size="14">professional, casual, or</text>
      <text x="22" y="124" fill="#9CA3AF" font-size="14">vivid.</text>
      <text x="22" y="156" fill="#35C89A" font-size="13" font-weight="700">20/20 mixed battery</text>
    </g>
  </g>
</svg>
